name: Build and Release .tipa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Check for code signing certificate
        id: check_cert
        run: |
          if [[ -n "$CERTIFICATE_DATA" && -n "$CERTIFICATE_PWD" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "Certificate found, will use for signing"
            echo "use_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "No certificate found, will use ad-hoc signing"
            echo "use_certificate=false" >> $GITHUB_OUTPUT
          fi

      - name: Import Certificate (if provided)
        if: steps.check_cert.outputs.use_certificate == 'true'
        env:
          CERTIFICATE_DATA: ${{ secrets.CERTIFICATE_DATA }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_P12=certificate.p12
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=${{ secrets.KEYCHAIN_PASSWORD }}

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN

          # Import certificate to keychain
          echo -n "$CERTIFICATE_DATA" | base64 --decode -o $CERTIFICATE_P12
          security import $CERTIFICATE_P12 -P "" -A -t cert -f pkcs12 -k $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN

          # Verify certificate is installed
          security find-identity -v -p codesigning $KEYCHAIN

      - name: Build the project
        env:
          PROJECT_NAME: Obsolete
          TARGET_NAME: Obsolete
        run: |
          # Set version
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(date +%s)
          BUNDLE_ID="com.example.obsolete"

          echo "Building $PROJECT_NAME..."
          echo "Version: $VERSION"
          echo "Build: $BUILD_NUMBER"

          # Build using target with explicit output path
          xcodebuild -project Obsolete.xcodeproj \
            -target Obsolete \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Obsolete.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive 2>&1 | tee build.log

          # Check if build succeeded
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Build failed with exit code $BUILD_EXIT"
            echo "Build log:"
            cat build.log
            exit 1
          fi

          # Extract .app from archive
          APP_PATH="build/Obsolete.xcarchive/Products/Applications/Obsolete.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            echo "Checking archive directory..."
            ls -la build/Obsolete.xcarchive/Products/Applications/
            exit 1
          fi

          echo "Build successful! App created at $APP_PATH"

      - name: Create .tipa package
        run: |
          APP_PATH="build/Obsolete.xcarchive/Products/Applications/Obsolete.app"

          # Create Package directory
          mkdir -p Package/Payload

          # Copy .app bundle
          echo "Copying app bundle..."
          cp -r "$APP_PATH" Package/Payload/

          # Verify the copy
          if [ ! -d "Package/Payload/Obsolete.app" ]; then
            echo "Error: Failed to copy app bundle"
            ls -la Package/Payload/
            exit 1
          fi

          # Create .tipa file
          echo "Creating .tipa package..."
          cd Package
          zip -r "Obsolete.tipa" *

          # Verify the .tipa was created
          if [ ! -f "Obsolete.tipa" ]; then
            echo "Error: Failed to create .tipa package"
            ls -la
            exit 1
          fi

          ls -lh "Obsolete.tipa"

          # Move to workspace root
          mv "Obsolete.tipa" ../

      - name: Upload .tipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Obsolete
          path: Obsolete.tipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Obsolete.tipa
          body: |
            ## Obsolete iOS Tweak

            **Version:** ${{ github.ref_name }}

            ### Installation
            1. Download the .tipa file
            2. Install via TrollStore or similar IPA installer
            3. Enjoy!

            ### Requirements
            - iOS 14.0+
            - Jailbroken device
            - TrollStore or AltStore

            Built with GitHub Actions
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
