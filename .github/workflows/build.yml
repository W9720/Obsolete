name: Build and Release .tipa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Check for code signing certificate
        id: check_cert
        run: |
          if [[ -n "$CERTIFICATE_DATA" && -n "$CERTIFICATE_PWD" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "Certificate found, will use for signing"
            echo "use_certificate=true" >> $GITHUB_OUTPUT
          else
            echo "No certificate found, will use ad-hoc signing"
            echo "use_certificate=false" >> $GITHUB_OUTPUT
          fi

      - name: Import Certificate (if provided)
        if: steps.check_cert.outputs.use_certificate == 'true'
        env:
          CERTIFICATE_DATA: ${{ secrets.CERTIFICATE_DATA }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_P12=certificate.p12
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=${{ secrets.KEYCHAIN_PASSWORD }}

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN

          # Import certificate to keychain
          echo -n "$CERTIFICATE_DATA" | base64 --decode -o $CERTIFICATE_P12
          security import $CERTIFICATE_P12 -P "" -A -t cert -f pkcs12 -k $KEYCHAIN
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN

          # Verify certificate is installed
          security find-identity -v -p codesigning $KEYCHAIN

      - name: Build the project
        env:
          PROJECT_NAME: Obsolete
          SCHEME_NAME: YMHUD
          TARGET_APP_PATH: ${{ github.workspace }}/DerivedData/Build/Products/Release-iphoneos/Obsolete.app
          CODESIGNING_FOLDER_PATH: ${{ github.workspace }}/DerivedData/Build/Products/Release-iphoneos/Obsolete.app
          CURRENT_PROJECT_VERSION: ${{ github.ref_name }}
          PRODUCT_BUNDLE_IDENTIFIER: com.example.obsolete
        run: |
          # Set bundle identifier and version
          BUNDLE_ID="com.example.obsolete"
          VERSION="${{ github.ref_name }}"
          BUILD_NUMBER=$(date +%s)

          # Create temporary Info.plist with proper bundle ID
          echo "Setting bundle ID: $BUNDLE_ID"
          echo "Setting version: $VERSION"

          # Build the project
          xcodebuild -project Obsolete.xcodeproj \
            -scheme YMHUD \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE="Automatic" \
            build 2>&1 | tail -50

          # Check if build succeeded
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed!"
            exit 1
          fi

          echo "Build successful!"

      - name: Create .tipa package
        env:
          PRODUCT_BUNDLE_IDENTIFIER: com.example.obsolete
          TARGET_APP_PATH: ${{ github.workspace }}/DerivedData/Build/Products/Release-iphoneos/Obsolete.app
        run: |
          # Create Package directory
          mkdir -p Package/Payload

          # Copy .app bundle
          cp -r "$TARGET_APP_PATH" Package/Payload/

          # Create .tipa file
          cd Package
          zip -r "${{ env.PROJECT_NAME }}.tipa" *
          ls -lh "${{ env.PROJECT_NAME }}.tipa"

          # Move to workspace root
          mv Package/*.tipa ./

      - name: Upload .tipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Obsolete-${{ github.ref_name }}.tipa
          path: Obsolete.tipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Obsolete.tipa
          body: |
            ## Obsolete iOS Tweak

            **Version:** ${{ github.ref_name }}

            ### Installation
            1. Download the .tipa file
            2. Install via TrollStore or similar IPA installer
            3. Enjoy!

            ### Requirements
            - iOS 14.0+
            - Jailbroken device
            - TrollStore or AltStore

            Built with GitHub Actions
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
