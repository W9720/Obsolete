name: Build and Release .tipa

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: macos-14
    env:
      PROJECT_NAME: Obsolete
      TARGET_NAME: Modifier
      BUNDLE_ID: com.qiqi.Modifier

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphoneos

      - name: Configure build version
        id: version
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="1.0.0"
          fi
          BUILD_NUMBER=$(date +%s)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (build $BUILD_NUMBER)"

      - name: Build with Xcode
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          BUILD_NUMBER: ${{ steps.version.outputs.BUILD_NUMBER }}
        run: |
          xcodebuild -project "$PROJECT_NAME.xcodeproj" \
            -scheme YMHUD \
            -configuration ${{ github.event.inputs.build_type || 'Release' }} \
            -sdk iphoneos \
            -archivePath build/"$PROJECT_NAME".xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            archive 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Build failed!"
            exit 1
          fi

      - name: Verify .app exists
        run: |
          APP_PATH="build/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            ls -la build/$PROJECT_NAME.xcarchive/Products/Applications/
            exit 1
          fi
          echo "App found: $APP_PATH"

      - name: Create .tipa package
        run: |
          APP_PATH="build/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app"
          
          mkdir -p Package/Payload
          cp -r "$APP_PATH" Package/Payload/
          
          cd Package
          zip -r "../$PROJECT_NAME.tipa" *
          cd ..
          
          if [ ! -f "$PROJECT_NAME.tipa" ]; then
            echo "Error: Failed to create .tipa"
            exit 1
          fi
          
          ls -lh "$PROJECT_NAME.tipa"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}
          path: ${{ env.PROJECT_NAME }}.tipa
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_NAME }}.tipa
          body: |
            ## ${{ env.PROJECT_NAME }} iOS Tweak

            **Version:** ${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download the .tipa file
            2. Install via TrollStore or similar IPA installer
            3. Enjoy!

            ### Requirements
            - iOS 14.0+
            - Jailbroken device
            - TrollStore or AltStore

            Built with GitHub Actions
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}